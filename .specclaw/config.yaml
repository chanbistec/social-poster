version: 1

project:
  name: "social-poster"
  description: "Multi-tenant social media posting platform. Supports multiple businesses with separate social accounts. CLI/MCP interface for AI agents + web dashboard for visual management."
  repo: "chanbistec/social-poster"

models:
  planning: "anthropic/claude-opus-4-6"
  coding: "anthropic/claude-sonnet-4-5"
  review: "anthropic/claude-sonnet-4-5"

git:
  strategy: "direct"
  auto_commit: true
  commit_prefix: "specclaw"
  branch_prefix: "specclaw/"
  worktree_dir: ".specclaw/worktrees"

build:
  test_command: ""
  lint_command: ""
  build_command: ""
  parallel_tasks: 3
  timeout_seconds: 600

notifications:
  enabled: true
  channel: "discord"
  target: "channel:1484778121139065062"
  on_complete: true
  on_failure: true
  on_approval_needed: true

github:
  sync: false
  repo: "chanbistec/social-poster"
  token: ""
  label: "specclaw"

workflow:
  strict: false

automation:
  auto_mode: false
  cron: ""
  max_tasks_per_run: 5
  auto_verify: true
  auto_archive: false
  post_build_review: true
